<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube mavjud emas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    width: 100vw;
    overflow: hidden;
    color: #fff;
  }

  @keyframes float {
    0%,100%{ transform: translateY(0px); }
    50%{ transform: translateY(-16px); }
  }
  @keyframes pulse-ring {
    0%{ transform: scale(0.85); opacity: 0.6; }
    100%{ transform: scale(2.2); opacity: 0; }
  }
  @keyframes fade-in-up {
    from{ opacity: 0; transform: translateY(30px); }
    to{ opacity: 1; transform: translateY(0); }
  }
  @keyframes blink-dot {
    0%,100%{ opacity: 1; }
    50%{ opacity: 0.15; }
  }
  @keyframes shake {
    0%,100%{ transform: translateX(0) rotate(0deg); }
    20%{ transform: translateX(-5px) rotate(-5deg); }
    40%{ transform: translateX(5px) rotate(5deg); }
    60%{ transform: translateX(-4px) rotate(-3deg); }
    80%{ transform: translateX(4px) rotate(3deg); }
  }
  @keyframes signal-wave {
    0%{ stroke-dashoffset: 0; }
    100%{ stroke-dashoffset: -40; }
  }
  @keyframes particle-float {
    0%{ transform: translateY(0) translateX(0); opacity: 0; }
    10%{ opacity: 1; }
    90%{ opacity: 0.6; }
    100%{ transform: translateY(-130px) translateX(var(--dx)); opacity: 0; }
  }
  @keyframes bg-rotate {
    from{ transform: rotate(0deg); }
    to{ transform: rotate(360deg); }
  }
  @keyframes grid-move {
    from{ background-position: 0 0; }
    to{ background-position: 40px 40px; }
  }
  @keyframes play-pulse {
    0%,100%{ transform: scale(1); }
    50%{ transform: scale(1.08); }
  }

  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: #0d0a0a;
    overflow: hidden;
  }

  .bg-grid {
    position: absolute;
    inset: -40px;
    background-image:
      linear-gradient(rgba(255,0,0,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,0,0,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: grid-move 8s linear infinite;
  }

  .bg-glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.16;
  }
  .bg-glow-1 {
    width: 650px; height: 650px;
    background: #ff0000;
    top: -180px; left: -180px;
    animation: bg-rotate 22s linear infinite;
  }
  .bg-glow-2 {
    width: 520px; height: 520px;
    background: #cc0000;
    bottom: -120px; right: -120px;
    animation: bg-rotate 28s linear infinite reverse;
  }
  .bg-glow-3 {
    width: 320px; height: 320px;
    background: #ff4444;
    bottom: 25%; left: 8%;
    opacity: 0.07;
  }

  .particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    animation: particle-float var(--dur) ease-in infinite;
    animation-delay: var(--delay);
    bottom: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  .icon-wrapper {
    position: relative;
    margin-bottom: 2.5rem;
    animation: float 3.5s ease-in-out infinite;
  }

  .pulse-ring {
    position: absolute;
    inset: -20px;
    border-radius: 28px;
    border: 1.5px solid rgba(255,0,0,0.45);
    animation: pulse-ring 2.4s ease-out infinite;
  }
  .pulse-ring:nth-child(2){ animation-delay: 0.8s; border-radius: 32px; }
  .pulse-ring:nth-child(3){ animation-delay: 1.6s; border-radius: 36px; }

  .yt-icon {
    width: 120px;
    height: 120px;
    background: linear-gradient(145deg, #ff1a1a, #ff0000, #cc0000);
    border-radius: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.1),
      0 12px 48px rgba(255,0,0,0.5),
      0 0 80px rgba(255,0,0,0.2);
    animation: play-pulse 3s ease-in-out infinite;
  }

  .badge-x {
    position: absolute;
    top: -12px; right: -12px;
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #ff6b6b, #cc0000);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2.5px solid #0d0a0a;
    box-shadow: 0 4px 16px rgba(204,0,0,0.6);
    animation: shake 3s ease-in-out infinite;
    animation-delay: 1.2s;
    z-index: 2;
  }

  h1 {
    font-size: clamp(26px, 5vw, 42px);
    font-weight: 700;
    color: #fff;
    margin: 0 0 1rem;
    animation: fade-in-up 0.7s ease both;
    animation-delay: 0.2s;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }

  .subtitle {
    font-size: clamp(14px, 2vw, 17px);
    color: rgba(255,255,255,0.5);
    margin: 0 0 0.5rem;
    animation: fade-in-up 0.7s ease both;
    animation-delay: 0.35s;
    max-width: 380px;
    line-height: 1.7;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,0,0,0.12);
    border: 1px solid rgba(255,0,0,0.28);
    color: #ff6b6b;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 18px;
    border-radius: 30px;
    margin: 1.4rem 0 2rem;
    animation: fade-in-up 0.7s ease both;
    animation-delay: 0.5s;
    backdrop-filter: blur(8px);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
    animation: blink-dot 1.4s ease-in-out infinite;
    box-shadow: 0 0 6px currentColor;
  }

  .signal-wrap {
    animation: fade-in-up 0.7s ease both;
    animation-delay: 0.65s;
    margin-bottom: 2rem;
  }

  .signal-path {
    stroke-dasharray: 8 6;
    animation: signal-wave 1.6s linear infinite;
  }

  .btn-group {
    display: flex;
    gap: 12px;
    animation: fade-in-up 0.7s ease both;
    animation-delay: 0.8s;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-primary {
    padding: 13px 36px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #ff1a1a, #ff0000);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,0,0,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(255,0,0,0.55);
  }
  .btn-primary:active { transform: scale(0.97); }

  .btn-secondary {
    padding: 13px 28px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: background 0.15s, color 0.15s;
  }
  .btn-secondary:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }

  .note {
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    margin-top: 1.6rem;
    animation: fade-in-up 0.7s ease both;
    animation-delay: 0.95s;
  }

  .error-code {
    font-size: 11px;
    font-family: monospace;
    color: rgba(255,255,255,0.12);
    margin-top: 0.5rem;
    letter-spacing: 1px;
    animation: fade-in-up 0.7s ease both;
    animation-delay: 1.1s;
  }
</style>
</head>
<body>

<div class="bg">
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>
  <div class="particles" id="particles"></div>
</div>

<div class="content">

  <div class="icon-wrapper">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>

    <div class="yt-icon">
      <!-- YouTube play button logo -->
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <rect x="4" y="14" width="56" height="36" rx="10" fill="white" opacity="0.95"/>
        <polygon points="26,22 26,42 44,32" fill="#ff0000"/>
      </svg>
    </div>

    <div class="badge-x">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 3L13 13M13 3L3 13" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <h1>YouTube hozircha<br>mavjud emas</h1>

  <p class="subtitle">
    Bu saytga ulanib bo'lmadi.<br>Youtube platformasi hozircha mavjud emas.
  </p>

  <div class="status-badge">
    <span class="status-dot"></span>
    Xizmat mavjud emas
  </div>

  <div class="signal-wrap">
    <svg width="130" height="44" viewBox="0 0 130 44">
      <rect x="10" y="30" width="16" height="12" rx="3" fill="rgba(255,255,255,0.08)"/>
      <rect x="32" y="22" width="16" height="20" rx="3" fill="rgba(255,255,255,0.07)"/>
      <rect x="54" y="14" width="16" height="28" rx="3" fill="rgba(255,255,255,0.05)"/>
      <rect x="76" y="6"  width="16" height="36" rx="3" fill="rgba(255,255,255,0.04)"/>
      <line class="signal-path"
            x1="6" y1="42" x2="120" y2="2"
            stroke="#ff4444" stroke-width="2.5"
            stroke-linecap="round"
            stroke-dasharray="8 6"/>
    </svg>
  </div>

  <div class="btn-group">
    <button class="btn-primary" onclick="
      this.textContent='Tekshirilmoqda...';
      this.style.opacity='0.7';
      setTimeout(()=>{ this.textContent='Qayta urinish'; this.style.opacity='1'; }, 2500)
    ">Qayta urinish</button>
    <a class="btn-secondary" style="text-decoration: none;" href="politexnikum.html" onclick="history.back()">Orqaga qaytish</a>
  </div>

  <p class="note">Agar muammo davom etsa, keyinroq qaytib keling</p>
  <p class="error-code">ERR_CONNECTION_REFUSED · youtube.com</p>

</div>

<script>
  const container = document.getElementById('particles');
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 2;
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${size}px;
      height: ${size}px;
      --dx: ${(Math.random() - 0.5) * 80}px;
      --dur: ${Math.random() * 6 + 5}s;
      --delay: ${Math.random() * 8}s;
      opacity: ${Math.random() * 0.5 + 0.2};
      background: ${Math.random() > 0.5 ? '#ff0000' : '#ff6b6b'};
    `;
    container.appendChild(p);
  }
</script>

</body>
</html>
